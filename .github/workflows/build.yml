name: Build

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.13']

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          make uv-download

      - name: Set up cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        run: |
          make install

      - name: Run safety checks
        run: |
          make check-safety

      - name: Run lint
        run: |
          make lint

  unit-tests:
    needs: lint

    runs-on: ubuntu-latest

    services:
      mg:
        image: ghcr.io/apowers313/roc-dev:1.3.2
        ports:
          - 7687:7687

    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.13']

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          make uv-download

      - name: Set up cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        run: |
          make install

      - name: Run unit tests
        run: |
          make test-unit

      - name: Check doc coverage
        run: |
          make doc-coverage

  dashboard-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: dashboard-ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm -C dashboard-ui install --frozen-lockfile

      - name: Type check
        run: pnpm -C dashboard-ui lint

      - name: Run tests
        run: pnpm -C dashboard-ui test

  build:
    needs: [unit-tests, dashboard-tests]

    runs-on: ubuntu-latest

    services:
      mg:
        image: ghcr.io/apowers313/roc-dev:1.3.2
        ports:
          - 7687:7687

    strategy:
      matrix:
        # TODO: try uv install on mac and windows
        # os: [windows-latest, ubuntu-latest, macos-latest]
        os: [ubuntu-latest]
        python-version: ['3.13']

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('uv.lock') }}

      - name: Install uv
        run: |
          make uv-download

      - name: Install dependencies
        run: |
          make install

      - name: Run tests
        run: |
          make test

      - name: Build coverage
        run: |
          make coverage

      - name: Publish Coverage
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage.lcov

      - name: Docs build
        run: |
          make docs

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: site
