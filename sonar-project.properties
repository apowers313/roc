sonar.projectKey=roc
sonar.projectName=ROC
sonar.host.url=http://hal.ato.ms:9000

sonar.sources=roc,tests,dashboard-ui/src
sonar.sourceEncoding=UTF-8
sonar.python.version=3.13

# External tool reports (generated by: make sonar-reports)
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.ruff.reportPaths=ruff-report.json
sonar.python.mypy.reportPaths=mypy-report.xml
sonar.javascript.lcov.reportPaths=dashboard-ui/coverage/lcov.info

# Tighten duplicate detection for AI-generated code
sonar.cpd.py.minimumTokens=50
sonar.cpd.py.minimumLines=5

# Exclusions
sonar.exclusions=**/tmp/**,**/node_modules/**
sonar.coverage.exclusions=tests/**,**/*.test.*,**/test_*,**/conftest.py
sonar.cpd.exclusions=tests/helpers/nethack_screens*.py

# S5603: Component/ExpMod subclasses are auto-registered via __init_subclass__
# and are used by the component registry even though SonarQube cannot trace that.
# S1135: TODO comments are tracked in the issue tracker and are informational only.
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S5603
sonar.issue.ignore.multicriteria.e1.resourceKey=tests/**
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S5603
sonar.issue.ignore.multicriteria.e2.resourceKey=roc/**
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S1135
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*
